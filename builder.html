<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Backpack Builder — Spicemas 2026</title>
    <meta name="description" content="Design your own carnival backpack wings for Spicemas 2026. Choose feathers, colors, and share your creation.">
    <meta name="theme-color" content="#1a0a2e">

    <!-- Open Graph -->
    <meta property="og:title" content="Build Your Backpack — Spicemas 2026">
    <meta property="og:description" content="Design your carnival backpack wings and share the vibe.">
    <meta property="og:type" content="website">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="builder-app">
        <!-- Preview area -->
        <div class="builder-preview">
            <canvas id="builder-canvas"></canvas>
            <div class="preview-buttons preview-buttons-right">
                <button class="preview-btn" id="sil-toggle" aria-label="Toggle silhouette">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                </button>
                <button class="preview-btn" id="sil-reset" aria-label="Reset silhouette position">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
                </button>
            </div>
            <div class="preview-buttons preview-buttons-left">
                <button class="preview-btn" id="btn-download" aria-label="Download image">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                </button>
                <button class="preview-btn" id="btn-share" aria-label="Share image">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
                </button>
            </div>
        </div>

        <!-- Bottom sheet controls -->
        <div class="builder-controls">
            <div class="builder-steps">
                <div class="step-indicator">
                    <span class="step-dot active" data-step="1"></span>
                    <span class="step-dot" data-step="2"></span>
                    <span class="step-dot" data-step="3"></span>
                    <span class="step-dot" data-step="4"></span>
                </div>
                <h2 class="step-title" id="step-title">Choose Backpack Shape</h2>
            </div>

            <div class="step-content" id="step-content">
                <!-- Step content injected by JS -->
            </div>

            <div class="step-nav">
                <button class="btn btn-back" id="btn-back" disabled>Back</button>
                <button class="btn btn-next" id="btn-next">Next</button>
            </div>
        </div>
    </div>

    <script type="module" src="/src/builder-main.js"></script>
</body>
</html>
